<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Besuchsanfrage</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <h1>Besuch</h1>
  <div class="theme">
  <input type="checkbox" id="theme-toggle" class="theme__toggle">
  <label for="theme-toggle" class="theme__label" title="Dark/Light umschalten">
    <span class="theme__icon" aria-hidden="true"></span>
    <span class="theme__text">Theme</span>
  </label>
</div>

  <nav class="nav">
    <a href="index.html">Start</a>
    <a href="history.html">Geschichte</a>
    <a href="visit.html">Besuch</a>
  </nav>
</header>

<main class="content single">
  <form class="form">
    <h2>Besuchsanfrage</h2>

    <label>
      Name
      <input type="text" required>
    </label>

    <label>
      E-Mail
      <input type="email" required>
    </label>

    <label>
      Besuchsart
      <select>
        <option>Touristisch</option>
        <option>Wissenschaftlich</option>
      </select>
    </label>

    <label>
      Nachricht
      <textarea rows="4"></textarea>
    </label>

    <button type="submit">Absenden</button>
  </form>
</main>

<footer class="footer">
  <p>Schulprojekt – Formular</p>
</footer>

</body>
</html>
